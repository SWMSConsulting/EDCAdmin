# Bob-Instanz. Interne EDC-Koordinaten ggf. an das echte Bob-Deployment anpassen.
# Secrets beim Deploy via --set oder existingSecret setzen.
edc:
  baseUrl: "http://bob-edc-controlplane:8081/management"
  participantId: "did:web:bob-windx.cluster.swms-cloud.com"
  bpn: "BPNL00000000WB02"
  dspAddress: "https://bob-edc-windx.cluster.swms-cloud.com/api/v1/dsp"

auth:
  username: "admin"

ingress:
  enabled: true
  className: nginx
  host: edcadmin-bob-windx.cluster.swms-cloud.com
  clusterIssuer: letsencrypt-prod
  tlsSecretName: edcadmin-bob-tls
  whitelistSourceRange: ""

fullnameOverride: edcadmin-bob

directory:
  enabled: true
  ihStsTokenUrl: "http://bob-ih:8087/api/sts/token"
  ihPresentationBaseUrl: "http://bob-ih:8083/api/credentials/v1/participants"
  bdrsDirectoryUrl: "https://auth-windx.cluster.swms-cloud.com/api/directory/bpn-directory"
  scope: "org.eclipse.tractusx.vc.type:MembershipCredential:read"
