# Bob-Instanz. Interne EDC-Koordinaten ggf. an das echte Bob-Deployment anpassen.
# Secrets beim Deploy via --set oder existingSecret setzen.
edc:
  baseUrl: "http://bob-edc-controlplane:8081/management"
  participantId: "did:web:bob-windx.cluster.swms-cloud.com"
  bpn: "BPNL00000000WB01"

auth:
  username: "admin"

ingress:
  enabled: true
  className: nginx
  host: edcadmin-bob-windx.cluster.swms-cloud.com
  clusterIssuer: letsencrypt-prod
  tlsSecretName: edcadmin-bob-tls
  whitelistSourceRange: ""

fullnameOverride: edcadmin-bob
