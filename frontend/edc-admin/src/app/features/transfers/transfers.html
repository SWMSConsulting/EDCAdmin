<h2 class="page-title">Transfers</h2>

<dx-data-grid
  class="grid"
  [dataSource]="store"
  keyExpr="id"
  [showBorders]="true"
  [columnAutoWidth]="true"
  [wordWrapEnabled]="true"
>
  <dxo-search-panel [visible]="true" [width]="280" placeholder="Suchen..."></dxo-search-panel>
  <dxo-header-filter [visible]="true"></dxo-header-filter>
  <dxo-paging [pageSize]="20"></dxo-paging>

  <dxi-column dataField="state" caption="Status" [width]="150"></dxi-column>
  <dxi-column dataField="type" caption="Rolle" [width]="120"></dxi-column>
  <dxi-column dataField="assetId" caption="Asset-ID"></dxi-column>
  <dxi-column dataField="contractId" caption="Contract-ID"></dxi-column>
  <dxi-column dataField="counterPartyId" caption="Gegenpartei"></dxi-column>
  <dxi-column dataField="id" caption="Transfer-ID" [visible]="false"></dxi-column>
  <dxi-column caption="Aktion" [width]="150" cellTemplate="dlCell" [allowFiltering]="false" [allowSorting]="false"></dxi-column>

  <div *dxTemplate="let cell of 'dlCell'">
    <dx-button
      text="Download"
      icon="download"
      stylingMode="text"
      type="default"
      [disabled]="cell.data.state !== 'STARTED'"
      (onClick)="download(cell.data.id)"
    ></dx-button>
  </div>
</dx-data-grid>
