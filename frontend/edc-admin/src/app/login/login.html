<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">EDC Admin</h1>
    <p class="login-subtitle">Management-Konsole</p>

    <form (submit)="$event.preventDefault(); submit()">
      <dx-form [formData]="credentials" labelMode="floating">
        <dxi-item
          dataField="username"
          [label]="{ text: 'Benutzername' }"
          [editorOptions]="{ stylingMode: 'outlined' }"
        ></dxi-item>
        <dxi-item
          dataField="password"
          [label]="{ text: 'Passwort' }"
          [editorOptions]="{ mode: 'password', stylingMode: 'outlined' }"
        ></dxi-item>
      </dx-form>

      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      <dx-button
        class="login-button"
        text="Anmelden"
        type="default"
        [useSubmitBehavior]="true"
        [disabled]="busy()"
        width="100%"
      ></dx-button>
    </form>
  </div>
</div>
